<header>

<main>

<div class="gallery">

<a href="#" class="cart" aria-label="View shopping basket">
<img src="Media/shopping.svg" alt="Shopping basket">
</a>


<section>

<figure>
<img src="Media/OceanPhoto.jpg" alt="People sitting on white cliffs overlooking the ocean in Greenland">
<figcaption>
This was from a fabulous trip to the cost of Greenland with my family. The water was lovely- but very cold!
</figcaption>
</figure>

<button aria-label="Add Greenland coast photograph to basket">
Add to basket
</button>

</section>


<section>

<figure>
<img src="Media/BridgePhoto.jpg" alt="Golden Gate Bridge photographed from below looking up">
<figcaption>
A picture of the Golden Gate Bridge. New York! New York!
</figcaption>
</figure>

<button aria-label="Add Golden Gate Bridge photograph to basket">
Add to basket
</button>

</section>


<section>

<figure>
<img src="Media/ValleyPhoto.jpg" alt="Large river valley surrounded by mountains in Greenland">
<figcaption>
Another great photo from Greenland. It's a river valley where a glacier used to be.
</figcaption>
</figure>

<button aria-label="Add Greenland valley photograph to basket">
Add to basket
</button>

</section>


<section>

<figure>
<img src="Media/WaterfallPhoto.jpg" alt="Large waterfall falling into a rocky pool surrounded by mossy cliffs">
<figcaption>
The waterfall made such a lovely sound. I could have fallen asleep!
</figcaption>
</figure>

<button aria-label="Add waterfall photograph to basket">
Add to basket
</button>

</section>

</div>

</main>
